<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АДМИН</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-box { width: 90%; max-width: 800px; margin: 50px auto; }
        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #000;
            font-family: inherit; box-sizing: border-box; font-size: 1.1rem;
        }
        button { 
            background: #000; color: #fff; border: none; padding: 20px; 
            width: 100%; cursor: pointer; font-weight: 900; margin-top: 10px;
        }
        button:hover { background: #ff0000; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-link">Новостное медиа</a>
        <a href="index.html" class="header-btn">НА САЙТ</a>
    </header>

    <main class="admin-box">
        <h2 class="news-title">Новая публикация</h2>
        <input type="text" id="title" placeholder="ЗАГОЛОВОК">
        <input type="text" id="date" placeholder="ДАТА (Напр: 26.04.2026)">
        <textarea id="short" placeholder="КРАТКОЕ ОПИСАНИЕ" rows="3"></textarea>
        <textarea id="full" placeholder="ПОЛНЫЙ ТЕКСТ" rows="10"></textarea>
        <button id="saveBtn">ОПУБЛИКОВАТЬ</button>
    </main>

    <script>
        document.getElementById('saveBtn').onclick = function() {
            const article = {
                id: Date.now().toString(),
                title: document.getElementById('title').value,
                date: document.getElementById('date').value,
                shortDesc: document.getElementById('short').value,
                fullText: document.getElementById('full').value
            };

            if (!article.title || !article.fullText) return alert("Заполни поля!");

            const data = JSON.parse(localStorage.getItem('news_data')) || [];
            data.push(article);
            localStorage.setItem('news_data', JSON.stringify(data));

            alert("Опубликовано!");
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
