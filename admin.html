<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВХОД | ZONE ADMIN</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        .admin-box { width: 90%; max-width: 600px; margin: 50px auto; display: none; } /* Скрыта до входа */
        .login-box { width: 90%; max-width: 400px; margin: 100px auto; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        input, textarea { width: 100%; padding: 15px; border: 2px solid #000; font-family: inherit; box-sizing: border-box; }
        button { background: #000; color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        button:hover { background: #ff0000; }
        #logoutBtn { background: none; color: #000; border: 1px solid #000; padding: 5px 10px; width: auto; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-link">ZONE ADMIN</a>
    <button id="logoutBtn" style="display:none" onclick="logout()">ВЫЙТИ</button>
</header>

<div id="loginSection" class="login-box">
    <h2 class="news-title" style="font-size: 1.5rem;">АВТОРИЗАЦИЯ</h2>
    <div class="input-group">
        <input type="email" id="loginEmail" placeholder="EMAIL">
    </div>
    <div class="input-group">
        <input type="password" id="loginPass" placeholder="ПАРОЛЬ">
    </div>
    <button onclick="login()">ВОЙТИ</button>
</div>

<main id="adminSection" class="admin-box">
    <h2 class="news-title">НОВАЯ ПУБЛИКАЦИЯ</h2>
    <div class="input-group">
        <input type="text" id="title" placeholder="ЗАГОЛОВОК">
    </div>
    <div class="input-group">
        <input type="text" id="slug" placeholder="URL-АДРЕС (SLUG)">
    </div>
    <div class="input-group">
        <input type="text" id="date" placeholder="ДАТА (26.04.2026)">
    </div>
    <div class="input-group">
        <textarea id="short" rows="3" placeholder="КРАТКОЕ ОПИСАНИЕ"></textarea>
    </div>
    <div class="input-group">
        <textarea id="full" rows="10" placeholder="ПОЛНЫЙ ТЕКСТ"></textarea>
    </div>
    <button onclick="publish()">ОПУБЛИКОВАТЬ</button>
</main>

<script>
    // 1. ТВОИ НАСТРОЙКИ FIREBASE (возьми в консоли: Project Settings -> General -> Your Apps)
    const firebaseConfig = {
    apiKey: "AIzaSyB8TvF2sMd-G4CCjkehVDq4tx1qRhhF1P4",
    authDomain: "shortener-b6223.firebaseapp.com",
    databaseURL: "https://shortener-b6223-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "shortener-b6223",
    storageBucket: "shortener-b6223.firebasestorage.app",
    messagingSenderId: "631352355174",
    appId: "1:631352355174:web:a219a296baace3b1f000a7"
  };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // СЛУШАТЕЛЬ СОСТОЯНИЯ: вошел пользователь или нет
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    });

    // ФУНКЦИЯ ВХОДА
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            alert("Ошибка входа: " + e.message);
        }
    }

    // ФУНКЦИЯ ВЫХОДА
    function logout() {
        auth.signOut();
    }

    // ФУНКЦИЯ ПУБЛИКАЦИИ
    async function publish() {
        const title = document.getElementById('title').value;
        let slug = document.getElementById('slug').value.trim().toLowerCase();
        
        if (!slug) slug = title.replace(/\s+/g, '-').toLowerCase(); // простая замена пробелов для примера

        const article = {
            title: title,
            date: document.getElementById('date').value,
            shortDesc: document.getElementById('short').value,
            fullText: document.getElementById('full').value
        };

        // Теперь мы используем SDK вместо обычного fetch, чтобы передать токен авторизации автоматически
        try {
            await firebase.database().ref('articles/' + slug).set(article);
            alert("Статья опубликована!");
            window.location.href = 'index.html';
        } catch (e) {
            alert("Ошибка доступа: Скорее всего, вы не авторизованы как админ.");
        }
    }
</script>

</body>
</html>
