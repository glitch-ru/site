<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONE | НОВОСТИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo-link">Новостное медиа</a>
    <a href="https://4726.vercel.app/donate" class="header-btn donate-btn">ПОДДЕРЖАТЬ</a>
</header>

<main id="main-container">
    <div class="news-feed" id="news-feed">Загрузка свежих новостей...</div>
</main>

<footer>18+. МАТЕРИАЛ СОЗДАН ДЛЯ ПУБЛИЧНОГО ИСПОЛЬЗОВАНИЯ</footer>

<script>
    const DB_URL = 'ВАША_ССЫЛКА_ИЗ_FIREBASE/articles.json';

    async function loadNews() {
        const newsFeed = document.getElementById('news-feed');
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            
            let articles = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];

            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (articleId && data[articleId]) {
                const a = data[articleId];
                newsFeed.innerHTML = `
                    <article class="single-article">
                        <div class="article-date">${a.date}</div>
                        <h1 class="news-title article-page-title">${a.title}</h1>
                        <p class="news-text full-text">${a.fullText}</p>
                        <a href="index.html" class="back-link">← НАЗАД К НОВОСТЯМ</a>
                    </article>`;
                return;
            }

            articles.reverse();
            const latest = articles.slice(0, 5);

            if (latest.length === 0) {
                newsFeed.innerHTML = '<p style="text-align:center; padding: 50px;">Новостей нет.</p>';
            } else {
                newsFeed.innerHTML = latest.map(a => `
                    <article class="feed-item">
                        <div class="article-date">${a.date}</div>
                        <a href="?id=${a.id}" class="article-link">
                            <h2 class="news-title">${a.title}</h2>
                        </a>
                        <p class="news-text">${a.shortDesc}</p>
                    </article>
                `).join('');
            }
        } catch (e) {
            newsFeed.innerHTML = '<p style="text-align:center; padding: 50px;">Ошибка подключения к базе данных.</p>';
        }
    }
    loadNews();
</script>
</body>
</html>
