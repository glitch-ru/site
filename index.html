<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONE | НОВОСТИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo-link">Новостное медиа</a>
    <a href="https://4726.vercel.app/donate" class="header-btn donate-btn">ПОДДЕРЖАТЬ</a>
</header>

<main id="main-container">
    <div class="news-feed" id="news-feed">
        </div>
</main>

<footer>
    18+. МАТЕРИАЛ СОЗДАН ДЛЯ ПУБЛИЧНОГО ИСПОЛЬЗОВАНИЯ
</footer>

<script>
    function renderNews() {
        const newsFeed = document.getElementById('news-feed');
        const articles = JSON.parse(localStorage.getItem('news_data')) || [];
        
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (articleId) {
            // Просмотр конкретной статьи
            const article = articles.find(a => a.id === articleId);
            if (article) {
                newsFeed.innerHTML = `
                    <article style="border-bottom: none;">
                        <div class="article-date">${article.date}</div>
                        <h1 class="news-title" style="font-size: 3.5rem;">${article.title}</h1>
                        <p class="news-text full-text">${article.fullText}</p>
                        <a href="index.html" class="back-link">← НАЗАД К НОВОСТЯМ</a>
                    </article>`;
                return;
            }
        }

        // Главная страница: Новые сверху, лимит 5
        const displayArticles = [...articles].reverse().slice(0, 5);

        if (displayArticles.length === 0) {
            newsFeed.innerHTML = '<p style="text-align:center; margin-top:50px;">Новостей пока нет.</p>';
        } else {
            newsFeed.innerHTML = displayArticles.map(a => `
                <article>
                    <div class="article-date">${a.date}</div>
                    <a href="?id=${a.id}" class="article-link">
                        <h2 class="news-title">${a.title}</h2>
                    </a>
                    <p class="news-text">${a.shortDesc}</p>
                </article>
            `).join('');
        }
    }
    renderNews();
</script>
</body>
</html>
