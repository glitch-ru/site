<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONE.TIMER</title>
    <style>
        :root {
            --accent: #ff0000;
            --black: #000000;
            --white: #ffffff;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--white);
            color: var(--black);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        header {
            border-bottom: 4px solid var(--black);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between; /* Распределяет лого и кнопку по краям */
            align-items: center;
        }

        /* Стиль для ссылки-логотипа */
        .logo-link {
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .logo-link:hover {
            opacity: 0.8;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            background: var(--black);
            color: var(--white);
            padding: 5px 10px;
            display: inline-block;
        }

        /* Красная кнопка в углу */
        .donate-btn {
            background: var(--accent);
            color: var(--white);
            text-decoration: none;
            padding: 8px 15px;
            font-weight: 900;
            font-size: 14px;
            border: none;
            transition: transform 0.1s;
        }

        .donate-btn:hover {
            transform: scale(1.05);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #timer {
            font-size: 15vw;
            font-weight: 900;
            line-height: 0.8;
            margin-bottom: 40px;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 600px;
            border: 2px solid var(--black);
        }

        .controls button {
            background: transparent;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .controls button:first-child {
            border-right: 2px solid var(--black);
        }

        .controls button:hover {
            background: var(--black);
            color: var(--white);
        }

        .settings {
            margin-top: 40px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        input {
            border: none;
            border-bottom: 2px solid var(--black);
            font-weight: 900;
            font-size: 1.2rem;
            width: 60px;
            text-align: center;
            outline: none;
        }

        footer {
            padding: 20px;
            font-size: 10px;
            border-top: 1px solid var(--black);
            text-align: center;
        }

        .is-running #timer { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <a href="https://4726.vercel.app" class="logo-link">
        <div class="logo">ZONE.TIMER</div>
    </a>
    
    <a href="https://4726.vercel.app/donate" class="donate-btn">
        ПОДДЕРЖАТЬ
    </a>
</header>

<main id="main-container">
    <div id="timer">25:00</div>
    
    <div class="controls">
        <button id="start">СТАРТ</button>
        <button id="reset">СБРОС</button>
    </div>

    <div class="settings">
        ЛИМИТ: <input type="number" id="minutesInput" value="25" min="1"> МИНУТ
    </div>
</main>

<footer>
    ДАННЫЙ ИНСТРУМЕНТ ПРЕДОСТАВЛЕН ДЛЯ ПУБЛИЧНОГО ИСПОЛЬЗОВАНИЯ
</footer>

<script>
    let timeLeft;
    let timerId = null;
    let isRunning = false;

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const minutesInput = document.getElementById('minutesInput');
    const mainContainer = document.getElementById('main-container');

    const savedTime = localStorage.getItem('zoneTime') || 25;
    minutesInput.value = savedTime;
    timeLeft = savedTime * 60;
    updateDisplay();

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const timeString = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        timerDisplay.textContent = timeString;
        document.title = isRunning ? `[${timeString}]` : 'ZONE.TIMER';
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerId);
            startBtn.textContent = 'ПРОДОЛЖИТЬ';
            mainContainer.classList.remove('is-running');
        } else {
            startBtn.textContent = 'ПАУЗА';
            mainContainer.classList.add('is-running');
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert('ВРЕМЯ ВЫШЛО');
                    resetTimer();
                }
            }, 1000);
        }
        isRunning = !isRunning;
    }

    function resetTimer() {
        clearInterval(timerId);
        isRunning = false;
        timeLeft = minutesInput.value * 60;
        startBtn.textContent = 'СТАРТ';
        mainContainer.classList.remove('is-running');
        updateDisplay();
    }

    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    minutesInput.addEventListener('change', () => {
        localStorage.setItem('zoneTime', minutesInput.value);
        resetTimer();
    });
</script>

</body>
</html>
