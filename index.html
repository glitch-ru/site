<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НОВОСТИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo-link">
        Новостное медиа
    </a>
    
    <a href="https://4726.vercel.app/donate" class="header-btn donate-btn">
        ПОДДЕРЖАТЬ
    </a>
</header>

<main id="main-container">
    <div class="news-feed" id="news-feed">
        <p style="text-align: center; margin-top: 50px;"></p>
    </div>
</main>

<footer>
    18+. МАТЕРИАЛ, ПРЕДОСТАВЛЕННЫЙ НА ЭТОМ САЙТЕ, СОЗДАН ДЛЯ ПУБЛИЧНОГО ИСПОЛЬЗОВАНИЯ
</footer>

<script>
    async function loadArticles() {
        const newsFeed = document.getElementById('news-feed');
        
        try {
            // Загружаем данные из JSON файла
            const response = await fetch('articles.json');
            
            if (!response.ok) {
                throw new Error('Файл articles.json не найден');
            }
            
            const articles = await response.json();
            
            // Получаем ID статьи из URL, если мы перешли по ссылке
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (articleId) {
                // РЕЖИМ ПРОСМОТРА ОДНОЙ СТАТЬИ
                const article = articles.find(a => a.id === articleId);
                
                if (article) {
                    newsFeed.innerHTML = `
                        <article style="border-bottom: none;">
                            <div class="article-date">${article.date}</div>
                            <h1 class="news-title" style="font-size: 4rem;">${article.title}</h1>
                            <p class="news-text full-text">${article.fullText}</p>
                            <a href="index.html" class="back-link">← НАЗАД К НОВОСТЯМ</a>
                        </article>
                    `;
                } else {
                    newsFeed.innerHTML = '<p style="text-align: center; margin-top: 50px;">Статья не найдена.</p><a href="index.html" class="back-link" style="text-align: center; display: block;">← НАЗАД</a>';
                }
            } else {
                // РЕЖИМ ЛЕНТЫ НОВОСТЕЙ
                if (articles.length === 0) {
                    newsFeed.innerHTML = '<p style="text-align: center; margin-top: 50px; font-size: 1.2rem;">Нет добавленных новостей.</p>';
                } else {
                    newsFeed.innerHTML = articles.map(article => `
                        <article>
                            <div class="article-date">${article.date}</div>
                            <a href="?id=${article.id}" class="article-link">
                                <h2 class="news-title">${article.title}</h2>
                            </a>
                            <p class="news-text">${article.shortDesc}</p>
                        </article>
                    `).join('');
                }
            }
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            newsFeed.innerHTML = '<p style="text-align: center; margin-top: 50px;">Ошибка загрузки статей. Убедитесь, что вы используете локальный сервер (например, Live Server), а файл articles.json существует.</p>';
        }
    }

    // Запускаем функцию при загрузке страницы
    loadArticles();
</script>

</body>
</html>
