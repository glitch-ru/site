<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONE | НОВОСТИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo-link">Новостное медиа</a>
    <a href="https://4726.vercel.app/donate" class="header-btn donate-btn">ПОДДЕРЖАТЬ</a>
</header>

<main id="main-container">
    <div class="news-feed" id="news-feed">Загрузка свежих новостей...</div>
</main>

<footer>18+. МАТЕРИАЛ СОЗДАН ДЛЯ ПУБЛИЧНОГО ИСПОЛЬЗОВАНИЯ</footer>

<script>
    const DB_URL = 'https://shortener-b6223-default-rtdb.europe-west1.firebasedatabase.app/articles.json';

    async function loadNews() {
        const newsFeed = document.getElementById('news-feed');
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            
            // Превращаем объект из Firebase в массив
            let articles = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];

            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (articleId && data[articleId]) {
                const a = data[articleId];
                newsFeed.innerHTML = `
                    <article style="border-bottom:none">
                        <div class="article-date">${a.date}</div>
                        <h1 class="news-title" style="font-size:3.5rem">${a.title}</h1>
                        <p class="news-text full-text">${a.fullText}</p>
                        <a href="index.html" class="back-link">← НАЗАД</a>
                    </article>`;
                return;
            }

            // Новые сверху, лимит 5
            articles.reverse();
            const latest = articles.slice(0, 5);

            if (latest.length === 0) {
                newsFeed.innerHTML = '<p style="text-align:center">Новостей нет.</p>';
            } else {
                newsFeed.innerHTML = latest.map(a => `
                    <article>
                        <div class="article-date">${a.date}</div>
                        <a href="?id=${a.id}" class="article-link"><h2 class="news-title">${a.title}</h2></a>
                        <p class="news-text">${a.shortDesc}</p>
                    </article>
                `).join('');
            }
        } catch (e) {
            newsFeed.innerHTML = 'Ошибка подключения к базе данных.';
        }
    }
    loadNews();
</script>
</body>
</html>
