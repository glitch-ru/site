<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONE.TIMER</title>
    <style>
        /* Стиль в духе zone.media */
        :root {
            --accent: #ff0000; /* Фирменный красный */
            --black: #000000;
            --white: #ffffff;
            --gray: #f4f4f4;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--white);
            color: var(--black);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            text-transform: uppercase; /* Текст в верхнем регистре для брутализма */
            letter-spacing: -0.02em;
        }

        header {
            border-bottom: 4px solid var(--black);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            background: var(--black);
            color: var(--white);
            padding: 5px 10px;
            display: inline-block;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #timer {
            font-size: 15vw; /* Огромные цифры */
            font-weight: 900;
            line-height: 0.8;
            margin-bottom: 40px;
            font-variant-numeric: tabular-nums; /* Чтобы цифры не прыгали */
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border: 2px solid var(--black);
            width: 100%;
            max-width: 600px;
        }

        button {
            background: transparent;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }

        button:first-child {
            border-right: 2px solid var(--black);
        }

        button:hover {
            background: var(--black);
            color: var(--white);
        }

        #start.active {
            background: var(--accent);
            color: var(--white);
            border-color: var(--accent);
        }

        .settings {
            margin-top: 40px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        input {
            border: none;
            border-bottom: 2px solid var(--black);
            font-family: inherit;
            font-weight: 900;
            font-size: 1.2rem;
            width: 60px;
            text-align: center;
            outline: none;
        }

        footer {
            padding: 20px;
            font-size: 10px;
            border-top: 1px solid var(--black);
            text-align: center;
        }

        /* Анимация мигания для акцента */
        .is-running #timer {
            color: var(--accent);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">ZONE.TIMER</div>
    <div>СЕГОДНЯ: <span id="date"></span></div>
</header>

<main id="main-container">
    <div id="timer">25:00</div>
    
    <div class="controls">
        <button id="start">СТАРТ</button>
        <button id="reset">СБРОС</button>
    </div>

    <div class="settings">
        УСТАНОВИТЬ ЛИМИТ: 
        <input type="number" id="minutesInput" value="25" min="1"> МИНУТ
    </div>
</main>

<footer>
    ДАННЫЙ ТАЙМЕР СОЗДАН В ЦЕЛЯХ ПОВЫШЕНИЯ ЭФФЕКТИВНОСТИ РАБОТЫ
</footer>

<script>
    let timeLeft;
    let timerId = null;
    let isRunning = false;

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const minutesInput = document.getElementById('minutesInput');
    const mainContainer = document.getElementById('main-container');

    // Дата в хедере
    document.getElementById('date').textContent = new Date().toLocaleDateString('ru-RU');

    const savedTime = localStorage.getItem('zoneTime') || 25;
    minutesInput.value = savedTime;
    timeLeft = savedTime * 60;
    updateDisplay();

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const timeString = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        timerDisplay.textContent = timeString;
        document.title = isRunning ? `[${timeString}]` : 'ZONE.TIMER';
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerId);
            startBtn.textContent = 'ПРОДОЛЖИТЬ';
            mainContainer.classList.remove('is-running');
        } else {
            startBtn.textContent = 'ПАУЗА';
            mainContainer.classList.add('is-running');
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert('ВРЕМЯ ВЫШЛО');
                    resetTimer();
                }
            }, 1000);
        }
        isRunning = !isRunning;
    }

    function resetTimer() {
        clearInterval(timerId);
        isRunning = false;
        timeLeft = minutesInput.value * 60;
        startBtn.textContent = 'СТАРТ';
        mainContainer.classList.remove('is-running');
        updateDisplay();
    }

    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    minutesInput.addEventListener('change', () => {
        localStorage.setItem('zoneTime', minutesInput.value);
        resetTimer();
    });
</script>

</body>
</html>
